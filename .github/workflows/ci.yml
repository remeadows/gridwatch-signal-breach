name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci --ignore-scripts

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Build
        run: npm run build

      - name: Verify deterministic replay fixtures
        run: |
          npm run typecheck:tools
          npm run verify:replays

      - name: Verify score validator bundle is in sync
        # The Edge Function replays runs with a bundle generated from src/sim.
        # Regenerate it and fail if it drifts from the committed copy, so the
        # server-side anti-cheat can never silently diverge from the game.
        run: |
          npm run build:validator
          git diff --exit-code -- supabase/functions/submit-gridwatch-score/sim.bundle.js \
            || (echo "::error::sim.bundle.js is stale — run 'npm run build:validator' and commit the result." && exit 1)
