name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci --ignore-scripts

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Build
        run: npm run build

      - name: Verify score validator bundle is in sync
        # The Edge Function replays runs with a bundle generated from src/sim.
        # Regenerate it and fail if it drifts from the committed copy, so the
        # server-side anti-cheat can never silently diverge from the game.
        run: |
          npm run build:validator
          git diff --exit-code -- supabase/functions/submit-gridwatch-score/sim.bundle.js \
            || (echo "::error::sim.bundle.js is stale — run 'npm run build:validator' and commit the result." && exit 1)
